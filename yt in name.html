<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingXina - Full Screen / شاشة كاملة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: "Roboto", "Arial", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            user-select: none;
        }

        .container:hover {
            transform: scale(1.05);
        }

        /* YouTube Logo SVG Styling */
        .youtube-logo {
            width: 150px;
            height: auto;
            filter: drop-shadow(0px 4px 20px rgba(255, 0, 0, 0.4));
        }

        .text-group {
            margin-top: 20px;
        }

        .text-label {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .text-arabic {
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 5px;
            direction: rtl;
        }

        .brand-name {
            display: block;
            margin-top: 15px;
            font-size: 1.2rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container" onclick="toggleFullScreen()">
        <svg class="youtube-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.517 3.545 12 3.545 12 3.545s-7.517 0-9.388.507a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.871.507 9.388.507 9.388.507s7.517 0 9.388-.507a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="#FF0000"/>
        </svg>
        
        <div class="text-group">
            <div class="text-label">Full Screen</div>
            <div class="text-arabic">شاشة كاملة</div>
        </div>
        
        <div class="brand-name">BingXina</div>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
