<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BingXina - Full Screen / شاشة كاملة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: "Roboto", "Arial", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            user-select: none;
        }

        .container:hover {
            transform: scale(1.05);
        }

        .text-group {
            margin-top: 10px;
        }

        .text-label {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .text-arabic {
            font-size: 2.7rem;
            font-weight: bold;
            margin-top: 10px;
            direction: rtl;
        }

        .brand-name {
            display: block;
            margin-top: 25px;
            font-size: 1.4rem;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="container" onclick="toggleFullScreen()">
        <div class="brand-name">Wazzap76</div>
    </div>

    <script>
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>

</body>
</html>
