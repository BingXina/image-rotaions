<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}


#container{

    position:absolute;
    right:30px;
    top:30px;

    width:300px;
    height:300px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;

    color:white;

}



#giftImage{

    width:220px;
    height:220px;

    object-fit:contain;

    flex-shrink:0;

    animation:float 2s ease-in-out infinite;

}



#action{

    margin-top:2px;

    width:300px;
    height:60px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:32px;
    font-weight:900;

    letter-spacing:1px;

    text-shadow:
    0 0 4px #000,
    0 0 8px #000,
    0 0 12px #000,
    0 0 18px rgba(255,255,255,0.4);

    text-align:center;

    line-height:1.1;

}



.fade{

    animation:fade 1s ease;

}



@keyframes fade{

    0%{

        opacity:0;

        transform:scale(.85);

    }


    100%{

        opacity:1;

        transform:scale(1);

    }

}



@keyframes float{

    0%,100%{

        transform:translateY(0);

    }


    50%{

        transform:translateY(-8px);

    }

}


</style>

</head>


<body>


<div id="container">

    <img id="giftImage">

    <div id="action"></div>

</div>



<script>


const gifts = [


{
image:"heartme.png",
action:"Totem"
},


{
image:"loveyousomuch.png",
action:"EG Apple / Diamond"
},


{
image:"rose.png",
action:"Random Mobs"
},


{
image:"tiktok.png",
action:"TNT"
},


{
image:"icecrean.png",
action:"Creeper"
},


{
image:"overreact.png",
action:"Charged Creeper"
},


{
image:"fingerheart.png",
action:"Arrow Rain"
},


{
image:"doughnut.png",
action:"Random PIT"
},


{
image:"hearts.png",
action:"No Movement 15 Sec"
}


];



let current = 0;



function updateGift(){


const gift = gifts[current];


const img = document.getElementById("giftImage");

const text = document.getElementById("action");

const container = document.getElementById("container");



container.classList.remove("fade");

void container.offsetWidth;



img.src = gift.image;

text.textContent = gift.action;



container.classList.add("fade");



current = (current + 1) % gifts.length;


}



updateGift();


setInterval(updateGift,5000);



</script>


</body>
</html>
